version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: libranova-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: libranova-backend
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/libranova
      - JWT_SECRET=${JWT_SECRET:-libranova_secure_secret_for_production}
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: libranova-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
